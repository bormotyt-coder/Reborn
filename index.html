
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#08090f">

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">

<title>reBorn</title>
</head>

<body style="margin:0;background:#08090f;">

<div id="app">

<header class="hdr">
<div class="logo">
<img src="icon-192.png" class="logo-icon">
<div class="logo-text">reBorn</div>
</div>
</header>

<section class="card">
<h2>Today's Calories</h2>
<div id="calories">0</div>
<button onclick="addCalories()">Add 100 kcal</button>
</section>

<section class="card">
<h2>Water</h2>
<div id="water">0 cups</div>
<button onclick="addWater()">Add Cup</button>
</section>

<section class="card">
<h2>Coach Chat</h2>
<div id="chat"></div>
<input id="chatInput" placeholder="Ask coach...">
<button onclick="sendChat()">Send</button>
</section>

</div>

<script src="./data.js"></script>
<script src="./app.js"></script>
</body>
</html>
