<!doctype html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Wave Slider Preview</title>
<style>
:root {
  --v11-font-display: 'Outfit', system-ui, sans-serif;
  --v11-font-body: 'DM Sans', system-ui, sans-serif;
  --v11-hair-2: rgba(255,255,255,0.10);
  --v11-text-3: rgba(255,255,255,0.55);
  --v11-accent: #FF2D00;
}
html,body{margin:0;padding:0;background:#0A1220;color:#fff;font-family:var(--v11-font-body);}
body{padding:24px;max-width:420px;margin:0 auto;}
h1{font-family:var(--v11-font-display);font-size:16px;letter-spacing:0.2em;color:rgba(255,255,255,0.5);font-weight:700;text-transform:uppercase;margin:0 0 18px;}
.card{background:rgba(14,23,41,0.6);border:1px solid rgba(255,255,255,0.06);border-radius:20px;padding:14px 16px;margin-bottom:20px;}
.hs-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.hs-title{font-family:var(--v11-font-display);font-size:15px;font-weight:700;letter-spacing:-0.01em;}
.hs-sub-inline{font-size:11px;color:rgba(255,255,255,0.55);}
.hs-sub-dim{opacity:0.55;}
#water-cups{font-family:var(--v11-font-display);color:var(--v11-accent);font-weight:800;}

/* ==== Paste of actual wave slider CSS ==== */
.water-wave-wrap {
  position: relative;
  width: 100%;
  height: 120px;
  border-radius: 16px;
  overflow: hidden;
  background:
    linear-gradient(180deg, rgba(255,255,255,0.025) 0%, rgba(255,255,255,0.005) 100%),
    rgba(10, 18, 32, 0.85);
  border: 1px solid rgba(255,255,255,0.06);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.04),
    inset 0 -10px 24px rgba(0,0,0,0.35);
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
  cursor: grab;
  margin-bottom: 10px;
  outline: none;
}
.water-wave-wrap.is-dragging { cursor: grabbing; }
.water-wave-svg {
  position: absolute; inset: 0; width: 100%; height: 100%;
  display: block; pointer-events: none;
}
.water-wave-ticks {
  position: absolute;
  inset: auto 14px 10px 14px;
  display: flex; justify-content: space-between;
  font-family: var(--v11-font-body);
  font-size: 9px; font-weight: 700;
  letter-spacing: 0.14em;
  color: rgba(255,255,255,0.22);
  pointer-events: none; z-index: 2;
}
.water-wave-thumb {
  position: absolute; top: 0; left: 0;
  width: 52px; height: 52px;
  border-radius: 50%;
  background:
    radial-gradient(circle at 30% 28%, rgba(255,255,255,0.55) 0%, rgba(255,255,255,0) 55%),
    linear-gradient(180deg, #DCEFFA 0%, #A5CFE6 45%, #6FA4C4 100%);
  border: 1.5px solid rgba(255,255,255,0.65);
  box-shadow: 0 4px 14px rgba(0,0,0,0.45), 0 0 0 1px rgba(0,0,0,0.12), inset 0 1px 2px rgba(255,255,255,0.6);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  color: #0A1220;
  z-index: 3; pointer-events: none;
  will-change: transform;
  transition: width .12s ease, height .12s ease;
}
.water-wave-wrap.is-dragging .water-wave-thumb {
  width: 56px; height: 56px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.55), 0 0 0 1px rgba(0,0,0,0.12), 0 0 0 4px rgba(127,176,212,0.18), inset 0 1px 2px rgba(255,255,255,0.6);
}
.water-wave-thumb-val {
  font-family: var(--v11-font-display);
  font-weight: 800; font-size: 17px; line-height: 1;
  letter-spacing: -0.03em;
}
.water-wave-thumb-unit {
  font-family: var(--v11-font-body);
  font-weight: 600; font-size: 8px;
  letter-spacing: 0.14em; text-transform: uppercase;
  opacity: 0.55; margin-top: 2px;
}
.water-wave-hint {
  position: absolute; top: 14px; left: 0; right: 0;
  text-align: center;
  font-family: var(--v11-font-body);
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.2em; text-transform: uppercase;
  color: rgba(255,255,255,0.32);
  pointer-events: none; z-index: 2;
  transition: opacity .25s ease;
}
.water-reset {
  background: transparent;
  border: 1px solid var(--v11-hair-2);
  color: var(--v11-text-3);
  padding: 4px 12px; font-size: 9px;
  border-radius: 99px; cursor: pointer;
  letter-spacing: 0.14em;
  font-family: var(--v11-font-body);
  font-weight: 700; text-transform: uppercase;
}
</style></head><body>
<h1>Wave Slider Preview</h1>
<div class="card">
  <div class="hs-head">
    <div class="hs-title">Hydration</div>
    <div class="hs-sub-inline">
      <span id="water-cups">0</span>
      <span class="hs-sub-dim">/ 8 cups · <span id="water-ml-display">0</span>&thinsp;mL</span>
    </div>
  </div>
  <div class="water-wave-wrap" id="water-wave-wrap" role="slider" tabindex="0"
       aria-label="Water intake" aria-valuemin="0" aria-valuemax="8" aria-valuenow="0">
    <svg class="water-wave-svg" id="water-wave-svg" preserveAspectRatio="none" aria-hidden="true">
      <defs>
        <clipPath id="water-wave-clip" clipPathUnits="userSpaceOnUse">
          <rect id="water-wave-clip-rect" x="0" y="0" width="100" height="100" rx="16" ry="16"/>
        </clipPath>
        <linearGradient id="water-wave-grad-bg" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"  stop-color="#7FB0D4" stop-opacity="0.45"/>
          <stop offset="100%" stop-color="#3A6B8C" stop-opacity="0.55"/>
        </linearGradient>
        <linearGradient id="water-wave-grad-fg" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"  stop-color="#AEDCF2" stop-opacity="0.95"/>
          <stop offset="100%" stop-color="#5E96BC" stop-opacity="0.85"/>
        </linearGradient>
      </defs>
      <g clip-path="url(#water-wave-clip)">
        <path id="water-wave-bg-path" fill="url(#water-wave-grad-bg)"></path>
        <path id="water-wave-fg-path" fill="url(#water-wave-grad-fg)"></path>
      </g>
    </svg>
    <div class="water-wave-ticks"><span>0</span><span>2</span><span>4</span><span>6</span><span>8</span></div>
    <div class="water-wave-thumb" id="water-wave-thumb">
      <div class="water-wave-thumb-val"><span id="water-wave-cups-lbl">0</span></div>
      <div class="water-wave-thumb-unit">cups</div>
    </div>
    <div class="water-wave-hint" id="water-wave-hint">Drag to log water</div>
  </div>
  <button class="water-reset" onclick="resetWater()">Reset</button>
</div>

<script>
// Minimal stand-in for the app.js environment
const KEY='rb5', CUPS=8, ML_PER_CUP=250;
function todayKey(){ return new Date().toISOString().slice(0,10); }
function gv(id){ return document.getElementById(id); }
let cups = 0;

// === begin paste of wave code from app.js ===
const _waveState = { mounted:false, displayCups:0, p1:0, p2:Math.PI, animTarget:null, animStart:0, animFrom:0, animDur:160, lastW:0, lastH:0 };
function _waveBuildPath(w, h, fill01, phase, freq, amp, baseOffset){
  const baseY = h * (1 - fill01) + baseOffset;
  const N = Math.max(24, Math.ceil(w / 8));
  let d = '';
  for (let i = 0; i <= N; i++){
    const x = (i / N) * w;
    const y = baseY + Math.sin((x / w) * freq * Math.PI * 2 + phase) * amp;
    d += (i === 0 ? 'M ' : 'L ') + x.toFixed(2) + ' ' + y.toFixed(2) + ' ';
  }
  d += 'L ' + w.toFixed(2) + ' ' + h.toFixed(2) + ' ';
  d += 'L 0 ' + h.toFixed(2) + ' Z';
  return d;
}
function _waveMeasureSurface(w, h, fill01, phase, freq, amp, baseOffset){
  const baseY = h * (1 - fill01) + baseOffset;
  return function(x){ return baseY + Math.sin((x / w) * freq * Math.PI * 2 + phase) * amp; };
}
function _waveLevelFromCups(c){ if (c <= 0) return 0; const f = Math.min(c / CUPS, 1); return 0.03 + f * 0.97; }
function _waveCommitCups(newCups, persist){
  cups = newCups;
  if (persist) localStorage.setItem(KEY+'_cups_'+todayKey(), String(cups));
  const a = gv('water-cups'); if (a) a.textContent = _waveFormatCups(cups);
  const b = gv('water-ml-display'); if (b) b.textContent = Math.round(cups * ML_PER_CUP).toLocaleString();
  const c = gv('water-wave-cups-lbl'); if (c) c.textContent = _waveFormatCups(cups);
  const wrap = gv('water-wave-wrap'); if (wrap) wrap.setAttribute('aria-valuenow', String(cups));
  const hint = gv('water-wave-hint'); if (hint) hint.style.opacity = cups <= 0.01 ? '' : '0';
}
function _waveFormatCups(c){ const r = Math.round(c * 2) / 2; return (r % 1 === 0) ? String(r) : r.toFixed(1); }
function _waveMountOnce(){
  if (_waveState.mounted) return;
  const wrap = gv('water-wave-wrap'); const svg = gv('water-wave-svg');
  const clipRect = gv('water-wave-clip-rect');
  const bgPath = gv('water-wave-bg-path'); const fgPath = gv('water-wave-fg-path');
  const thumb = gv('water-wave-thumb');
  if (!wrap) return;
  _waveState.mounted = true;
  _waveState.displayCups = cups;
  let W=0,H=0;
  const measure = ()=>{ const r=wrap.getBoundingClientRect(); W=Math.max(1,Math.round(r.width)); H=Math.max(1,Math.round(r.height)); svg.setAttribute('viewBox','0 0 '+W+' '+H); svg.setAttribute('width',W); svg.setAttribute('height',H); clipRect.setAttribute('width',W); clipRect.setAttribute('height',H); _waveState.lastW=W; _waveState.lastH=H; };
  measure();
  if (typeof ResizeObserver !== 'undefined') new ResizeObserver(measure).observe(wrap);
  let dragging=false;
  const setFromClientX = (cx, commit)=>{ const r=wrap.getBoundingClientRect(); const ratio=Math.max(0,Math.min(1,(cx-r.left)/r.width)); let nc = ratio*CUPS; if(commit) nc=Math.round(nc*2)/2; else nc=Math.round(nc*20)/20; _waveState.displayCups=nc; _waveCommitCups(nc, commit); };
  wrap.addEventListener('pointerdown', e=>{ dragging=true; wrap.classList.add('is-dragging'); try{ wrap.setPointerCapture(e.pointerId);}catch(_){} setFromClientX(e.clientX, false); e.preventDefault(); });
  wrap.addEventListener('pointermove', e=>{ if(!dragging) return; setFromClientX(e.clientX, false); });
  const onUp = e=>{ if(!dragging) return; dragging=false; wrap.classList.remove('is-dragging'); const s=Math.round(_waveState.displayCups*2)/2; _waveState.animFrom=_waveState.displayCups; _waveState.animTarget=s; _waveState.animStart=performance.now(); _waveCommitCups(s, true); };
  wrap.addEventListener('pointerup', onUp);
  wrap.addEventListener('pointercancel', onUp);
  let lastT=performance.now();
  const loop=now=>{
    const dt=Math.min(64, now-lastT); lastT=now;
    _waveState.p1 += dt*0.0011;
    _waveState.p2 -= dt*0.00075;
    if (_waveState.animTarget!==null){
      const t=Math.min(1,(now-_waveState.animStart)/_waveState.animDur);
      const e=1-Math.pow(1-t,3);
      _waveState.displayCups = _waveState.animFrom + (_waveState.animTarget-_waveState.animFrom)*e;
      if (t>=1){ _waveState.displayCups=_waveState.animTarget; _waveState.animTarget=null; }
    }
    const w=_waveState.lastW, h=_waveState.lastH;
    if (w>0 && h>0){
      const fill=_waveLevelFromCups(_waveState.displayCups);
      bgPath.setAttribute('d', _waveBuildPath(w,h,fill,_waveState.p1,1.6,3.0,3));
      fgPath.setAttribute('d', _waveBuildPath(w,h,fill,_waveState.p2,2.2,4.2,0));
      const thumbX = (Math.round(_waveState.displayCups*20)/20/CUPS)*w;
      const surfaceY = _waveMeasureSurface(w,h,fill,_waveState.p2,2.2,4.2,0)(thumbX);
      const tw=thumb.offsetWidth||52, th=thumb.offsetHeight||52;
      const cx=Math.max(tw/2+2, Math.min(w-tw/2-2, thumbX));
      const cy=Math.max(th/2+2, Math.min(h-th/2-2, surfaceY));
      thumb.style.transform='translate('+(cx-tw/2)+'px,'+(cy-th/2)+'px)';
    }
    requestAnimationFrame(loop);
  };
  requestAnimationFrame(loop);
}
function renderCups(){ _waveMountOnce(); if (_waveState.animTarget===null) _waveState.displayCups=cups; _waveCommitCups(cups, false); }
function resetWater(){ _waveState.animFrom=_waveState.displayCups; _waveState.animTarget=0; _waveState.animStart=performance.now(); cups=0; _waveCommitCups(0, false); }
renderCups();
</script>
</body></html>
